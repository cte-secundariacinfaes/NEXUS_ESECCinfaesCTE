// ─── Auto-tag generator based on pin types ───
const TAG_PRESETS = [{
  match: ["power", "power"],
  prefix: "PWR"
}, {
  match: ["gnd", "gnd"],
  prefix: "GND"
}, {
  match: ["i2c", "i2c"],
  prefix: "I2C"
}, {
  match: ["spi", "spi"],
  prefix: "SPI"
}, {
  match: ["uart", "uart"],
  prefix: "UART"
}, {
  match: ["pwm"],
  prefix: "PWM"
}, {
  match: ["analog"],
  prefix: "ADC"
}, {
  match: ["digital"],
  prefix: "DIG"
}];
function generateTag(srcNode, srcSide, srcIdx, dstNode, dstSide, dstIdx) {
  const srcPin = (srcSide === "L" ? srcNode.pinsL : srcNode.pinsR || [])[srcIdx] || "";
  const dstPin = (dstSide === "L" ? dstNode.pinsL : dstNode.pinsR || [])[dstIdx] || "";
  const srcType = (srcSide === "L" ? srcNode.pinsLTypes : srcNode.pinsRTypes || [])[srcIdx] || "digital";
  const dstType = (dstSide === "L" ? dstNode.pinsLTypes : dstNode.pinsRTypes || [])[dstIdx] || "digital";
  // Check known pin names first
  const knownNames = ["VCC", "GND", "5V", "3V3", "3.3V", "VIN", "SDA", "SCL", "TX", "RX", "MOSI", "MISO", "SCK", "CS", "SS"];
  for (const kn of knownNames) {
    if (srcPin.toUpperCase().includes(kn)) return kn;
    if (dstPin.toUpperCase().includes(kn)) return kn;
  }
  // Fallback to type-based prefix
  for (const tp of TAG_PRESETS) {
    if (tp.match.includes(srcType) || tp.match.includes(dstType)) {
      const pinName = dstPin.replace(/[^a-zA-Z0-9]/g, "") || srcPin.replace(/[^a-zA-Z0-9]/g, "");
      return tp.prefix + "_" + pinName;
    }
  }
  return "SIG_" + (dstPin || srcPin).replace(/[^a-zA-Z0-9]/g, "").substring(0, 8);
}

// ─── Validation engine ───
function validateWire(wire, awgEntry) {
  const warnings = [];
  if (!awgEntry || !wire.currentMA || !wire.voltageV) return warnings;
  const currentA = wire.currentMA / 1000;
  // Current capacity check
  if (currentA > awgEntry.amps) {
    warnings.push({
      severity: "red",
      msg: `Corrente ${wire.currentMA}mA excede capacidade do AWG${awgEntry.awg} (${awgEntry.amps * 1000}mA). Usar cabo mais grosso.`
    });
  } else if (currentA > awgEntry.amps * 0.8) {
    warnings.push({
      severity: "yellow",
      msg: `Corrente ${wire.currentMA}mA está a ${Math.round(currentA / awgEntry.amps * 100)}% da capacidade do AWG${awgEntry.awg}. Margem reduzida.`
    });
  }
  // Voltage drop check
  if (wire.lengthCm && wire.voltageV) {
    const lengthM = wire.lengthCm / 100;
    const vDrop = currentA * awgEntry.ohm_per_m * lengthM * 2; // round-trip
    const vDropPct = vDrop / wire.voltageV * 100;

        severity: "red",

      });

      warnings.push({
        severity: "yellow",
        msg: `Queda de tensão: ${vDrop.toFixed(2)}V (${vDropPct.toFixed(1)}%). Aceitável mas monitorar.`

  }

}

// ─── Component recommendation engine ───
function getRecommendations(nodes, wires) {
  const recs = [];
  const nodeMap = {};
  nodes.forEach(n => {
    nodeMap[n.id] = n;
  });

  // Check each node
  nodes.forEach(n => {
    const name = n.name.toLowerCase();
    const allPinTypes = [...(n.pinsLTypes || []), ...(n.pinsRTypes || [])];
    const connectedWires = wires.filter(w => w.srcNode === n.id || w.dstNode === n.id);
    const hasI2C = allPinTypes.includes("i2c");
    const hasSPI = allPinTypes.includes("spi");
    const hasPower = allPinTypes.includes("power");

    // I2C without pull-ups mentioned
    if (hasI2C && connectedWires.some(w => w.label?.toUpperCase().includes("SDA") || w.label?.toUpperCase().includes("SCL"))) {
      recs.push({
        node: n.name,
        severity: "info",
        msg: "Barramento I2C: verificar resistências pull-up 4.7k\u03A9 no SDA e SCL (se não incluídas no módulo)."
      });
    }

    // Sensors needing decoupling
    if (name.includes("bme") || name.includes("dht") || name.includes("mpu") || name.includes("max301") || name.includes("aht") || name.includes("bmp") || name.includes("capacitivo") || name.includes("solo")) {
      recs.push({
        node: n.name,
        severity: "info",
        msg: "Recomenda-se condensador 100nF entre VCC e GND junto ao sensor para filtragem de ruído."
      });
    }

    // Capacitive soil sensor specifics
    if (name.includes("capacitivo") || name.includes("solo") || name.includes("soil")) {
      recs.push({
        node: n.name,
        severity: "yellow",
        msg: "Sensor capacitivo do solo: cabo curto (<30cm), par entrançado recomendado. Evitar passar junto a fontes de ruído."
      });
    }

    // Relay / motor / solenoid
    if (name.includes("rel") || name.includes("relay") || name.includes("motor") || name.includes("solen") || name.includes("bobina")) {
      recs.push({
        node: n.name,
        severity: "yellow",
        msg: "Carga indutiva: díodo flyback (1N4007) em paralelo inverso com a bobina. Alimentação separada recomendada."
      });
    }

    // Servo
    if (name.includes("servo")) {
      recs.push({
        node: n.name,
        severity: "yellow",
        msg: "Servo motor: alimentação separada recomendada (não pelo pino 5V do MCU). Condensador 100\u00B5F na alimentação do servo."
      });
    }

    // Motor DC / stepper
    if (name.includes("motor") || name.includes("stepper") || name.includes("nema") || name.includes("a4988") || name.includes("l298") || name.includes("l293")) {
      recs.push({
        node: n.name,
        severity: "yellow",
        msg: "Motor: alimentação separada obrigatória. GND comum com o MCU. Condensador 100\u00B5F junto ao driver."
      });
    }

    // LED
    if (name.includes("led") && !name.includes("oled")) {
      recs.push({
        node: n.name,
        severity: "info",
        msg: "LED: verificar resistência em série (220\u03A9\u20131k\u03A9 para 5V, 100\u03A9\u2013470\u03A9 para 3.3V)."
      });
    }

    // Long I2C cables
    connectedWires.forEach(w => {
      if (w.lengthCm && w.lengthCm > 100 && (w.label?.toUpperCase().includes("SDA") || w.label?.toUpperCase().includes("SCL"))) {
        recs.push({
          node: n.name,
          severity: "red",
          msg: `I2C com cabo de ${w.lengthCm}cm: limite prático ~100cm. Considerar I2C extender, buffer (PCA9600) ou RS-485.`
        });
      }
      if (w.lengthCm && w.lengthCm > 50 && allPinTypes.includes("analog")) {
        recs.push({
          node: n.name,
          severity: "yellow",
          msg: "Sinal analógico com cabo >50cm: usar cabo blindado ou par entrançado para reduzir ruído."
        });
      }
    });

    // SPI long cables
    if (hasSPI) {
      connectedWires.forEach(w => {
        if (w.lengthCm && w.lengthCm > 20 && (w.label?.toUpperCase().includes("MOSI") || w.label?.toUpperCase().includes("SCK"))) {
          recs.push({
            node: n.name,
            severity: "yellow",
            msg: `SPI com cabo de ${w.lengthCm}cm: manter cabos SPI curtos (<20cm). Reduzir clock se necessário.`
          });
        }
      });
    }

    // Power without decoupling (check if node is MCU-like)
    if ((name.includes("arduino") || name.includes("esp") || name.includes("stm") || name.includes("pico") || name.includes("mega") || name.includes("nano") || name.includes("uno")) && hasPower) {
      recs.push({
        node: n.name,
        severity: "info",
        msg: "MCU: condensador 100nF entre VCC e GND junto a cada IC/módulo. Condensador 100\u00B5F na entrada de alimentação."
      });
    }
  });

  // Deduplicate
  const seen = new Set();
  return recs.filter(r => {
    const key = r.node + r.msg;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

const store = {
  async get(k) {
    try {
      if (window.storage?.get) {
        const r = await window.storage.get(k);
        return r?.value || null;
      }
      return localStorage.getItem(k);
    } catch (e) {
      return null;
    }
  },
  async set(k, v) {
    try {
      if (window.storage?.set) {
        await window.storage.set(k, v);
        return true;
      }
      localStorage.setItem(k, v);
      return true;
    } catch (e) {
      return false;
    }
  },
  async del(k) {
    try {
      if (window.storage?.delete) {
        await window.storage.delete(k);
        return true;
      }
      localStorage.removeItem(k);
      return true;
    } catch (e) {
      return false;
    }
  },
  async list(prefix) {
    try {
      if (window.storage?.list) {
        const r = await window.storage.list(prefix);
        return r?.keys || [];
      }
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    } catch (e) {
      return [];
    }
  }
};

function getBlockHeight(comp) {

    x: comp.x + w,

}
