// STORAGE ABSTRACTION (works in Claude artifacts AND GitHub Pages)
// ═══════════════════════════════════════════════════════════════════
const store = {
  async get(k) {
    try {
      if (window.storage?.get) {
        const r = await window.storage.get(k);
        return r?.value || null;
      }
      return localStorage.getItem(k);
    } catch {
      return null;
    }
  },
  async set(k, v) {
    try {
      if (window.storage?.set) {
        await window.storage.set(k, v);
        return true;
      }
      localStorage.setItem(k, v);
      return true;
    } catch {
      return false;
    }
  },
  async del(k) {
    try {
      if (window.storage?.delete) {
        await window.storage.delete(k);
        return true;
      }
      localStorage.removeItem(k);
      return true;
    } catch {
      return false;
    }
  },
  async list(prefix) {
    try {
      if (window.storage?.list) {
        const r = await window.storage.list(prefix);
        return r?.keys || [];
      }
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    } catch {
      return [];
    }
  }
};

// HELPERS
// ═══════════════════════════════════════════════════════════════════
const hk = (r, c) => `${r},${c}`;
const hp = (r, c) => ({
  x: BP + c * HS,
  y: BP + r * HS
});
const coord = (r, c) => `${String.fromCharCode(65 + r % 26)}${c + 1}`;

// ─── Union-Find for net detection ───
class UnionFind {
  constructor() {
    this.parent = {};
    this.rank = {};
  }
  find(x) {
    if (!this.parent[x]) {
      this.parent[x] = x;
      this.rank[x] = 0;
    }
    if (this.parent[x] !== x) this.parent[x] = this.find(this.parent[x]);
    return this.parent[x];
  }
  union(a, b) {
    const ra = this.find(a),
      rb = this.find(b);
    if (ra === rb) return;
    if ((this.rank[ra] || 0) < (this.rank[rb] || 0)) this.parent[ra] = rb;else if ((this.rank[ra] || 0) > (this.rank[rb] || 0)) this.parent[rb] = ra;else {
      this.parent[rb] = ra;
      this.rank[ra] = (this.rank[ra] || 0) + 1;
    }
  }
}
function detectNets(components, board) {
  const uf = new UnionFind();
  components.forEach(c => {
    if (c.from && c.to) {
      uf.union(hk(c.from.r, c.from.c), hk(c.to.r, c.to.c));
    }
    if (c.type === "library" && c.pins) {
      // Library components: connect based on internal connections if any
      // For now, each pin is its own node unless explicitly wired
    }
  });
  // Breadboard auto-connections
  if (board.type === "breadboard") {
    for (let c = 0; c < board.cols; c++) {
      // Power rails (connected horizontally in groups)
      (board.powerRows || []).forEach(pr => {
        const grp = Math.floor(c / (board.groupSize || 5));
        const base = grp * (board.groupSize || 5);
        for (let cc = base; cc < Math.min(base + (board.groupSize || 5), board.cols); cc++) {
          if (cc !== c) uf.union(hk(pr, c), hk(pr, cc));
        }
      });
      // Main columns (connected vertically in groups of 5)
      const mainRows = [];
      for (let r = 0; r < board.rows; r++) {
        if (!(board.powerRows || []).includes(r) && r !== board.gapAfterRow) mainRows.push(r);
      }
      const topGroup = mainRows.filter(r => r < (board.gapAfterRow || 7));
      const bottomGroup = mainRows.filter(r => r > (board.gapAfterRow || 7));
      [topGroup, bottomGroup].forEach(group => {
        for (let i = 1; i < group.length; i++) {
          uf.union(hk(group[0], c), hk(group[i], c));
        }
      });
    }
  }
  // Build net map
  const nets = {};
  const allHoles = new Set();
  components.forEach(c => {
    if (c.from) {
      allHoles.add(hk(c.from.r, c.from.c));
      allHoles.add(hk(c.to.r, c.to.c));
    }
  });
  const NET_COLORS = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#f9ca24", "#a29bfe", "#fd79a8", "#00b894", "#e17055", "#6c5ce7", "#81ecec", "#fab1a0", "#74b9ff"];
  let netIdx = 0;
  allHoles.forEach(h => {
    const root = uf.find(h);
    if (!nets[root]) nets[root] = {
      color: NET_COLORS[netIdx++ % NET_COLORS.length],
      holes: []
    };
    nets[root].holes.push(h);
  });
  return {
    uf,
    nets
  };
}
function detectConflicts(components) {
  // Find holes connected to multiple different colored wires
  const holeWires = {};
  components.forEach((c, i) => {
    if (c.from && c.to) {
      [hk(c.from.r, c.from.c), hk(c.to.r, c.to.c)].forEach(h => {
        if (!holeWires[h]) holeWires[h] = new Set();
        holeWires[h].add(c.color);
      });
    }
  });
  const conflicts = {};
  Object.entries(holeWires).forEach(([h, colors]) => {
    if (colors.size > 1) conflicts[h] = true;
  });
  return conflicts;
}

// PRINT HTML GENERATOR
// ═══════════════════════════════════════════════════════════════════
function generatePrintHTML(name, board, components, holeColors, customLib) {
  const svgW = BP * 2 + (board.cols - 1) * HS,
    svgH = BP * 2 + (board.rows - 1) * HS;
  let holes = "",
    labels = "",
    comps = "";
  for (let r = 0; r < board.rows; r++) for (let c = 0; c < board.cols; c++) {
    const {
      x,
      y
    } = hp(r, c);
    const k = hk(r, c);
    const hc = holeColors[k];
    holes += `<circle cx="${x}" cy="${y}" r="${PR}" fill="#ddd" stroke="#bbb" stroke-width="0.5"/>`;
    holes += `<circle cx="${x}" cy="${y}" r="${HR}" fill="${hc || "#fff"}" stroke="${hc || "#999"}" stroke-width="${hc ? 1.5 : 0.5}"/>`;
  }
  for (let c = 0; c < board.cols; c++) {
    const {
      x
    } = hp(0, c);
    labels += `<text x="${x}" y="10" text-anchor="middle" font-size="7" fill="#666" font-family="monospace">${c + 1}</text>`;
  }
  for (let r = 0; r < board.rows; r++) {
    const {
      y
    } = hp(r, 0);
    labels += `<text x="7" y="${y + 3}" text-anchor="middle" font-size="7" fill="#666" font-family="monospace">${String.fromCharCode(65 + r)}</text>`;
  }
  components.forEach(comp => {
    if (comp.type === "wire" || comp.type === "jumper") {
      const f = hp(comp.from.r, comp.from.c),
        t = hp(comp.to.r, comp.to.c);
      if (comp.type === "jumper") {
        const mx = (f.x + t.x) / 2,
          my = Math.min(f.y, t.y) - 14;
        comps += `<path d="M${f.x},${f.y} Q${mx},${my} ${t.x},${t.y}" stroke="${comp.color}" stroke-width="2" fill="none" stroke-dasharray="4,3"/>`;
      } else comps += `<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${comp.color}" stroke-width="2.5" stroke-linecap="round"/>`;
      comps += `<circle cx="${f.x}" cy="${f.y}" r="2.5" fill="${comp.color}"/><circle cx="${t.x}" cy="${t.y}" r="2.5" fill="${comp.color}"/>`;
    } else if (["resistor", "capacitor", "led", "diode"].includes(comp.type)) {
      const f = hp(comp.from.r, comp.from.c),
        t = hp(comp.to.r, comp.to.c);
      const mx = (f.x + t.x) / 2,
        my = (f.y + t.y) / 2;
      comps += `<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="#888" stroke-width="1.5"/>`;
      if (comp.type === "resistor") {
        const dx = t.x - f.x,
          dy = t.y - f.y,
          len = Math.sqrt(dx * dx + dy * dy),
          bl = Math.min(len * 0.5, 20),
          ang = Math.atan2(dy, dx) * 180 / Math.PI;
        comps += `<rect x="${mx - bl / 2}" y="${my - 4}" width="${bl}" height="8" rx="1.5" fill="#d4a574" stroke="#8B6914" stroke-width="1" transform="rotate(${ang},${mx},${my})"/>`;
      } else if (comp.type === "led") {
        comps += `<circle cx="${mx}" cy="${my}" r="5" fill="${comp.color}" opacity="0.6" stroke="${comp.color}"/>`;
      } else if (comp.type === "diode") {
        comps += `<polygon points="${mx - 4},${my - 4} ${mx + 4},${my} ${mx - 4},${my + 4}" fill="#333" stroke="#666" stroke-width="0.5"/>`;
      } else {
        comps += `<line x1="${mx - 3}" y1="${my - 5}" x2="${mx - 3}" y2="${my + 5}" stroke="#4a90d9" stroke-width="2.5"/><line x1="${mx + 3}" y1="${my - 5}" x2="${mx + 3}" y2="${my + 5}" stroke="#4a90d9" stroke-width="2.5"/>`;
      }
      comps += `<text x="${mx}" y="${my - 9}" text-anchor="middle" font-size="7" fill="#333" font-family="monospace" font-weight="bold">${comp.label || ""}</text>`;
    } else if (comp.type === "ic") {
      const {
        x: ox,
        y: oy
      } = hp(comp.origin.r, comp.origin.c);
      const w = (comp.w - 1) * HS,
        h = (comp.h - 1) * HS;
      comps += `<rect x="${ox - 5}" y="${oy - 5}" width="${w + 10}" height="${h + 10}" rx="2" fill="#e8e8e8" stroke="#333" stroke-width="1.2"/>`;
      comps += `<text x="${ox + w / 2}" y="${oy + h / 2 + 3}" text-anchor="middle" font-size="9" fill="#333" font-family="monospace" font-weight="bold">${comp.label || "IC"}</text>`;
    } else if (comp.type === "header") {
      for (let i = 0; i < comp.len; i++) {
        const pr = comp.origin.r + (comp.dir === "v" ? i : 0),
          pc = comp.origin.c + (comp.dir === "h" ? i : 0);
        if (pr >= board.rows || pc >= board.cols) break;
        const {
          x,
          y
        } = hp(pr, pc);
        comps += `<rect x="${x - 4}" y="${y - 4}" width="8" height="8" rx="1" fill="#ddd" stroke="#f39c12" stroke-width="1.2"/>`;
      }
    } else if (comp.type === "library") {
      const def = [...PRESET_LIBRARY, ...(customLib || [])].find(l => l.id === comp.libraryId);
      if (def) {
        const {
          x: ox,
          y: oy
        } = hp(comp.origin.r, comp.origin.c);
        const w = (def.w - 1) * HS,
          h = (def.h - 1) * HS;
        comps += `<rect x="${ox - 6}" y="${oy - 6}" width="${w + 12}" height="${h + 12}" rx="3" fill="${def.bodyColor || "#333"}" stroke="#666" stroke-width="1"/>`;
        comps += `<text x="${ox + w / 2}" y="${oy + h / 2 + 3}" text-anchor="middle" font-size="8" fill="#fff" font-family="monospace" font-weight="bold">${comp.label || def.name}</text>`;
      }
    } else if (comp.type === "label") {
      const {
        x,
        y
      } = hp(comp.pos.r, comp.pos.c);
      comps += `<text x="${x}" y="${y - 10}" text-anchor="middle" font-size="9" fill="${comp.color}" font-family="monospace" font-weight="bold">${comp.text || ""}</text>`;
    }
  });
  const connections = components.filter(c => c.from && c.to).map((c, i) => ({
    i: i + 1,
    type: TOOLS.find(t => t.id === c.type)?.label || c.type,
    from: coord(c.from.r, c.from.c),
    to: coord(c.to.r, c.to.c),
    color: c.color,
    label: c.label || "—"
  }));
  const placed = components.filter(c => c.origin).map((c, i) => ({
    i: i + 1,
    type: c.type === "library" ? PRESET_LIBRARY.find(l => l.id === c.libraryId)?.name || c.libraryId : TOOLS.find(t => t.id === c.type)?.label || c.type,
    pos: coord(c.origin.r, c.origin.c),
    label: c.label || "—"
  }));
  const bom = {};
  components.forEach(c => {
    const t = c.type === "library" ? PRESET_LIBRARY.find(l => l.id === c.libraryId)?.name || "Lib" : TOOLS.find(tt => tt.id === c.type)?.label || c.type;
    if (!bom[t]) bom[t] = 0;
    bom[t]++;
  });
  const now = new Date().toLocaleString("pt-PT");
  return `<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><title>Esquema — ${name}</title>
<style>@page{size:A4;margin:12mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;color:#1a1a1a;font-size:11px;line-height:1.4;padding:10px}

}

// ═══════════════════════════════════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════
const PerfboardDesigner = function PerfboardDesigner() {
  // ─── Board & tool state ───
  const [boardIdx, setBoardIdx] = useState(3);
  const [customBoards, setCustomBoards] = useState([]);
  const [showBoardCreator, setShowBoardCreator] = useState(false);
  const [newBoardLabel, setNewBoardLabel] = useState("");
  const [newBoardCols, setNewBoardCols] = useState(20);
  const [newBoardRows, setNewBoardRows] = useState(10);
  const [newBoardType, setNewBoardType] = useState("perfboard");
  const allBoards = useMemo(() => [...ALL_BOARDS, ...customBoards], [customBoards]);
  const board = allBoards[boardIdx] || ALL_BOARDS[3];
  const [tool, setTool] = useState("wire");
  const [color, setColor] = useState(COLORS[0]);
  const [components, setComponents] = useState([]);
  const [holeColors, setHoleColors] = useState({});
  const [wireStart, setWireStart] = useState(null);
  const [hoverHole, setHoverHole] = useState(null);

  // Tool options
  const [icWidth, setIcWidth] = useState(4);
  const [icHeight, setIcHeight] = useState(2);
  const [headerLen, setHeaderLen] = useState(4);
  const [headerDir, setHeaderDir] = useState("h");
  const [labelText, setLabelText] = useState("R1");
  const [selectedLibComp, setSelectedLibComp] = useState(null);

  // View
  const [showBack, setShowBack] = useState(false);
  const [dualView, setDualView] = useState(false);
  const [zoom, setZoom] = useState(1);
  const [showNets, setShowNets] = useState(false);
  const [showConflicts, setShowConflicts] = useState(true);
  const [bgImage, setBgImage] = useState(null);
  const [bgOpacity, setBgOpacity] = useState(0.2);

  // Editing
  const [history, setHistory] = useState([]);
  const [selectedComp, setSelectedComp] = useState(null);
  const [dragging, setDragging] = useState(null);
  const [editingLabel, setEditingLabel] = useState(null);
  const [editText, setEditText] = useState("");

  // Project
  const [projectName, setProjectName] = useState("Sem título");
  const [showSaveModal, setShowSaveModal] = useState(false);
  const [showLoadModal, setShowLoadModal] = useState(false);
  const [savedProjects, setSavedProjects] = useState([]);
  const [saveStatus, setSaveStatus] = useState(null);
  const [loadingProjects, setLoadingProjects] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);

  // Library / Custom components
  const [showLibrary, setShowLibrary] = useState(false);
  const [showCreator, setShowCreator] = useState(false);
  const [customLibrary, setCustomLibrary] = useState([]);
  const [creatorName, setCreatorName] = useState("");
  const [creatorW, setCreatorW] = useState(4);
  const [creatorH, setCreatorH] = useState(2);
  const [creatorColor, setCreatorColor] = useState("#444");
  const [creatorPins, setCreatorPins] = useState({});
  const [creatorCat, setCreatorCat] = useState("Personalizado");
  const svgRef = useRef(null);
  const svgBackRef = useRef(null);
  const fileInputRef = useRef(null);
  const bgInputRef = useRef(null);
  const editInputRef = useRef(null);
  const canvasRef = useRef(null);
  const svgW = BP * 2 + (board.cols - 1) * HS;
  const svgH = BP * 2 + (board.rows - 1) * HS;

  // ─── Load custom library + custom boards on mount ───
  useEffect(() => {
    (async () => {
      const data = await store.get("perfboard_custom_library");
      if (data) try {
        setCustomLibrary(JSON.parse(data));
      } catch {}
      const boards = await store.get("perfboard_custom_boards");
      if (boards) try {
        setCustomBoards(JSON.parse(boards));
      } catch {}
    })();
  }, []);
  const saveCustomLib = async lib => {
    setCustomLibrary(lib);
    await store.set("perfboard_custom_library", JSON.stringify(lib));
  };
  const saveCustomBoards = async boards => {
    setCustomBoards(boards);
    await store.set("perfboard_custom_boards", JSON.stringify(boards));
  };
  const createCustomBoard = async () => {
    const c = Math.max(2, Math.min(80, newBoardCols));
    const r = Math.max(2, Math.min(50, newBoardRows));
    const label = newBoardLabel.trim() || `${c}×${r}`;
    const id = `custom_${Date.now()}`;
    const nb = {
      id,
      label,
      cols: c,
      rows: r,
      type: newBoardType
    };
    if (newBoardType === "breadboard") {
      nb.powerRows = [0, 1, r - 2, r - 1];
      nb.gapAfterRow = Math.floor(r / 2);
      nb.groupSize = 5;
    }
    const boards = [...customBoards, nb];
    await saveCustomBoards(boards);
    setBoardIdx(ALL_BOARDS.length + boards.length - 1);
    setComponents([]);
    setHoleColors({});
    setWireStart(null);
    setShowBoardCreator(false);
  };
  const deleteCustomBoard = async id => {
    await saveCustomBoards(customBoards.filter(b => b.id !== id));
    if (boardIdx >= ALL_BOARDS.length) setBoardIdx(3);
  };

  // ─── Fit to screen ───
  const fitToScreen = useCallback(() => {
    const el = canvasRef.current;
    if (!el) return;
    const cw = el.clientWidth - (dualView ? 30 : 40);
    const ch = el.clientHeight - 80;
    const effectiveW = dualView ? svgW * 2 + 20 : svgW;
    const zx = cw / effectiveW;
    const zy = ch / svgH;
    setZoom(Math.max(0.2, Math.min(zx, zy, 3)));
  }, [svgW, svgH, dualView]);

  // Auto-fit on mount, board change, and window resize
  useEffect(() => {
    const timer = setTimeout(fitToScreen, 150);
    const handleResize = () => {
      clearTimeout(timer);
      setTimeout(fitToScreen, 100);
    };
    window.addEventListener("resize", handleResize);
    return () => {
      clearTimeout(timer);
      window.removeEventListener("resize", handleResize);
    };
  }, [fitToScreen, boardIdx]);

  // ─── Net detection (memoized) ───
  const {
    nets,
    conflicts
  } = useMemo(() => {
    const n = showNets ? detectNets(components, board) : {
      nets: {}
    };
    const c = showConflicts ? detectConflicts(components) : {};
    return {
      nets: n.nets,
      conflicts: c
    };
  }, [components, board, showNets, showConflicts]);

  // ─── History ───
  const pushHistory = useCallback(() => {
    setHistory(h => [...h.slice(-40), {
      components: JSON.parse(JSON.stringify(components)),
      holeColors: {
        ...holeColors
      }
    }]);
  }, [components, holeColors]);
  const undo = useCallback(() => {
    if (!history.length) return;
    const prev = history[history.length - 1];
    setComponents(prev.components);
    setHoleColors(prev.holeColors);
    setHistory(h => h.slice(0, -1));
    setSelectedComp(null);
  }, [history]);

  // ─── Save / Load ───
  const saveToStorage = async n => {
    setSaveStatus("saving");
    const k = `perfboard:${(n || projectName).replace(/[^a-zA-Z0-9_-]/g, "_")}`;
    const ok = await store.set(k, JSON.stringify({
      projectName: n || projectName,
      boardIdx,
      components,
      holeColors,
      savedAt: new Date().toISOString()
    }));
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => {
      setSaveStatus(null);
      setShowSaveModal(false);
    }, 1300);
  };
  const loadProjectList = async () => {
    setLoadingProjects(true);
    const keys = await store.list("perfboard:");
    const projects = [];
    for (const k of keys) {
      const v = await store.get(k);
      if (v) try {
        const d = JSON.parse(v);
        projects.push({
          key: k,
          name: d.projectName || k.replace("perfboard:", ""),
          savedAt: d.savedAt,
          boardIdx: d.boardIdx,
          count: d.components?.length || 0
        });
      } catch {}
    }
    setSavedProjects(projects.sort((a, b) => (b.savedAt || "").localeCompare(a.savedAt || "")));
    setLoadingProjects(false);
    setShowLoadModal(true);
  };
  const loadFromStorage = async key => {
    const v = await store.get(key);
    if (v) {
      const d = JSON.parse(v);
      setBoardIdx(d.boardIdx ?? 3);
      setComponents(d.components || []);
      setHoleColors(d.holeColors || {});
      setProjectName(d.projectName || "");
      setHistory([]);
      setSelectedComp(null);
      setWireStart(null);
    }
    setShowLoadModal(false);
  };

  // ─── File export/import ───
  const exportFile = () => {
    const blob = new Blob([JSON.stringify({
      _format: "perfboard-designer",
      _version: 2,
      projectName,
      boardIdx,
      components,
      holeColors,
      customLibrary,
      savedAt: new Date().toISOString()
    }, null, 2)], {
      type: "application/json"
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${projectName.replace(/\s/g, "_")}.perfboard.json`;
    a.click();
    setSaveStatus("saved");
    setTimeout(() => setSaveStatus(null), 1500);
  };
  const importFile = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.components) {
          pushHistory();
          setBoardIdx(d.boardIdx ?? 3);
          setComponents(d.components || []);
          setHoleColors(d.holeColors || {});
          setProjectName(d.projectName || file.name.replace(/\..*$/, ""));
          if (d.customLibrary?.length) {
            saveCustomLib([...customLibrary, ...d.customLibrary.filter(c => !customLibrary.find(e => e.id === c.id))]);
          }
          setHistory([]);
          setSelectedComp(null);
          setSaveStatus("saved");
          setTimeout(() => setSaveStatus(null), 1500);
        }
      } catch {
        alert("Ficheiro inválido.");
      }
    };
    reader.readAsText(file);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  // ─── Background image ───
  const handleBgImage = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setBgImage(ev.target.result);
    reader.readAsDataURL(file);
    if (bgInputRef.current) bgInputRef.current.value = "";
  };

  // ─── Print ───
  const handlePrint = () => {
    const html = generatePrintHTML(projectName, board, components, holeColors, customLibrary);
    const win = window.open("", "_blank");
    if (win) {
      win.document.write(html);
      win.document.close();
      setTimeout(() => win.print(), 500);
    }
  };

  // ─── SVG Interaction ───
  const getHole = useCallback(e => {
    const svg = svgRef.current;
    if (!svg) return null;
    const rect = svg.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const scale = zoom * (dualView ? 0.5 : 1);
    const x = (clientX - rect.left) / scale,
      y = (clientY - rect.top) / scale;
    const c = Math.round((x - BP) / HS),
      r = Math.round((y - BP) / HS);
    if (r < 0 || r >= board.rows || c < 0 || c >= board.cols) return null;
    return {
      r,
      c
    };
  }, [zoom, board, dualView]);
  const handleSvgClick = e => {
    if (dragging) return;
    const h = getHole(e);
    if (!h) return;

    // Double-click = edit label
    if (e.detail === 2 && tool === "select") {
      const idx = findCompAt(h);
      if (idx >= 0) {
        const c = components[idx];
        setEditingLabel(idx);
        setEditText(c.label || c.text || "");
        setTimeout(() => editInputRef.current?.focus(), 50);
        return;
      }
    }
    if (tool === "select") {
      const idx = findCompAt(h);
      setSelectedComp(idx >= 0 ? idx : null);
      return;
    }
    if (tool === "eraser") {
      // First try to find and delete a component at this hole
      const idx = findCompAt(h);
      if (idx >= 0) {
        deleteCompWithHoles(idx);
      } else {
        // Just clear the hole color
        pushHistory();
        setHoleColors(hc => {
          const nh = {
            ...hc
          };
          delete nh[hk(h.r, h.c)];
          return nh;
        });
      }
      return;
    }
    const twoClick = ["wire", "jumper", "resistor", "capacitor", "led", "diode"];
    if (twoClick.includes(tool)) {
      if (!wireStart) {
        setWireStart(h);
      } else {
        if (wireStart.r === h.r && wireStart.c === h.c) {
          setWireStart(null);
          return;
        }
        pushHistory();
        const lbl = tool === "resistor" ? "R" : tool === "capacitor" ? "C" : tool === "led" ? "LED" : tool === "diode" ? "D" : "";
        setComponents(cs => [...cs, {
          type: tool,
          from: wireStart,
          to: h,
          color,
          label: lbl
        }]);
        setWireStart(null);
      }
    } else if (tool === "ic") {
      if (h.r + icHeight - 1 < board.rows && h.c + icWidth - 1 < board.cols) {
        pushHistory();
        setComponents(cs => [...cs, {
          type: "ic",
          origin: h,
          w: icWidth,
          h: icHeight,
          color: "#34495e",
          label: "IC"
        }]);
      }
    } else if (tool === "header") {
      pushHistory();
      setComponents(cs => [...cs, {
        type: "header",
        origin: h,
        len: headerLen,
        dir: headerDir,
        color: "#f39c12"
      }]);
    } else if (tool === "label") {
      pushHistory();
      setComponents(cs => [...cs, {
        type: "label",
        pos: h,
        text: labelText,
        color
      }]);
    } else if (tool === "library" && selectedLibComp) {
      const def = [...PRESET_LIBRARY, ...customLibrary].find(l => l.id === selectedLibComp);
      if (def && h.r + def.h - 1 < board.rows && h.c + def.w - 1 < board.cols) {
        pushHistory();
        setComponents(cs => [...cs, {
          type: "library",
          libraryId: def.id,
          origin: h,
          label: def.name,
          pins: def.pins
        }]);
      }
    }
    if (tool !== "label" && tool !== "select" && tool !== "eraser") setHoleColors(hc => ({
      ...hc,
      [hk(h.r, h.c)]: color
    }));
  };
  const findCompAt = h => {
    return components.findIndex(c => {
      if (c.from && c.to) return Math.abs(c.from.r - h.r) + Math.abs(c.from.c - h.c) <= 1 || Math.abs(c.to.r - h.r) + Math.abs(c.to.c - h.c) <= 1;
      if (c.origin) {
        const w = c.w || (c.type === "library" ? [...PRESET_LIBRARY, ...customLibrary].find(l => l.id === c.libraryId)?.w || 1 : c.len || 1);
        const ht = c.h || (c.type === "library" ? [...PRESET_LIBRARY, ...customLibrary].find(l => l.id === c.libraryId)?.h || 1 : 1);
        const cw = c.dir === "v" ? 1 : w,
          ch = c.dir === "v" ? c.len || ht : ht;
        return h.r >= c.origin.r && h.r <= c.origin.r + ch - 1 && h.c >= c.origin.c && h.c <= c.origin.c + cw - 1;
      }
      if (c.pos) return c.pos.r === h.r && c.pos.c === h.c;
      return false;
    });
  };

  // ─── Get holes occupied by a component ───
  const getCompHoles = comp => {
    const holes = [];
    if (comp.from) holes.push(hk(comp.from.r, comp.from.c));
    if (comp.to) holes.push(hk(comp.to.r, comp.to.c));
    if (comp.pos) holes.push(hk(comp.pos.r, comp.pos.c));
    if (comp.origin) {
      if (comp.type === "ic") {
        for (let i = 0; i < (comp.w || 1); i++) {
          holes.push(hk(comp.origin.r, comp.origin.c + i));
          holes.push(hk(comp.origin.r + (comp.h || 1) - 1, comp.origin.c + i));
        }
      } else if (comp.type === "header") {
        for (let i = 0; i < (comp.len || 1); i++) {
          const pr = comp.origin.r + (comp.dir === "v" ? i : 0);
          const pc = comp.origin.c + (comp.dir === "h" ? i : 0);
          holes.push(hk(pr, pc));
        }
      } else if (comp.type === "library") {
        const def = [...PRESET_LIBRARY, ...customLibrary].find(l => l.id === comp.libraryId);
        if (def) def.pins.forEach(p => holes.push(hk(comp.origin.r + p.r, comp.origin.c + p.c)));
      }
    }
    return holes;
  };

  // ─── Delete component + clean its holes ───
  const deleteCompWithHoles = idx => {
    if (idx === null || idx === undefined || idx < 0 || idx >= components.length) return;
    pushHistory();
    const comp = components[idx];
    const holesToClean = getCompHoles(comp);
    // Only clean holes not used by other components
    const otherHoles = new Set();
    components.forEach((c, i) => {
      if (i !== idx) getCompHoles(c).forEach(h => otherHoles.add(h));
    });
    setHoleColors(hc => {
      const nh = {
        ...hc
      };
      holesToClean.forEach(h => {
        if (!otherHoles.has(h)) delete nh[h];
      });
      return nh;
    });
    setComponents(cs => cs.filter((_, i) => i !== idx));
    setSelectedComp(null);
  };

  // ─── Drag ───
  const handleDragStart = e => {
    if (tool !== "select" || selectedComp === null) return;
    const h = getHole(e);
    if (!h) return;
    const c = components[selectedComp];
    const origin = c.origin || c.from || c.pos;
    if (!origin) return;
    setDragging({
      idx: selectedComp,
      offsetR: h.r - origin.r,
      offsetC: h.c - origin.c
    });
    e.preventDefault?.();
  };
  const handleDragMove = e => {
    const h = getHole(e);
    setHoverHole(h);
    if (!dragging || !h) return;
    e.preventDefault?.();
  };
  const handleDragEnd = e => {
    if (!dragging) return;
    const h = getHole(e) || hoverHole;
    if (h) {
      const newR = h.r - dragging.offsetR,
        newC = h.c - dragging.offsetC;
      if (newR >= 0 && newC >= 0 && newR < board.rows && newC < board.cols) {
        pushHistory();
        setComponents(cs => cs.map((c, i) => {
          if (i !== dragging.idx) return c;
          const nc = {
